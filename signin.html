<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Sign In | Picnique Luxury Experiences</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#D4AF37',
                        secondary: '#FFF9F5',
                        accent: '#F8D7DA',
                    },
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
</head>
<body class="bg-secondary dark:bg-[#121212] text-text-dark dark:text-text-light min-h-screen flex items-center justify-center p-6 bg-fixed">

    <div class="max-w-xl w-full bg-white dark:bg-[#1A1A1A] rounded-[3rem] shadow-2xl overflow-hidden min-h-[600px] flex flex-col items-center justify-center">
        <!-- Right Side: Form (Centered) -->
        <div class="w-full p-10 md:p-16 flex flex-col justify-center">
            <div class="mb-10 text-center">
                <a href="index.html" class="flex items-center justify-center space-x-3 mb-10 group">
                    <img src="assets/favicon.svg" alt="Picnique Logo" class="h-12 w-12 object-contain group-hover:scale-110 transition-transform">
                    <span class="font-serif text-3xl font-bold text-primary tracking-tight">Picnique</span>
                </a>
                <h1 class="text-2xl font-serif mb-2">Welcome Back</h1>
                <p class="text-gray-400 text-xs uppercase tracking-widest font-medium">Please sign in to your elite account</p>
            </div>

            <form class="space-y-6">
                <div>
                    <label class="block text-[10px] uppercase tracking-widest font-black text-gray-400 mb-2">Email address</label>
                    <input type="email" required class="w-full bg-gray-50 dark:bg-black/20 border border-gray-100 dark:border-white/5 py-3 px-4 rounded-xl focus:border-primary outline-none transition-all placeholder-gray-300" placeholder="alex@luxe.com">
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-[10px] uppercase tracking-widest font-black text-gray-400">Password</label>
                        <a href="#" class="text-[9px] text-primary uppercase tracking-widest hover:underline">Forgot?</a>
                    </div>
                    <input type="password" required class="w-full bg-gray-50 dark:bg-black/20 border border-gray-100 dark:border-white/5 py-3 px-4 rounded-xl focus:border-primary outline-none transition-all placeholder-gray-300" placeholder="••••••••">
                </div>

                <button type="submit" class="w-full py-4 bg-primary text-white text-xs font-bold uppercase tracking-[0.2em] rounded-xl hover:shadow-2xl hover:shadow-primary/30 transition-all hover:-translate-y-1">
                    Sign In
                </button>

                <div class="relative flex py-8 items-center">
                    <div class="flex-grow border-t border-gray-100 dark:border-white/5"></div>
                    <span class="flex-shrink mx-4 text-gray-400 text-[10px] uppercase tracking-widest">Or login with</span>
                    <div class="flex-grow border-t border-gray-100 dark:border-white/5"></div>
                </div>

                <!-- Social Login -->
                <div class="grid grid-cols-3 gap-4">
                    <button type="button" class="group flex items-center justify-center py-3 px-2 border border-gray-100 dark:border-white/5 rounded-xl hover:bg-gray-50 dark:hover:bg-white/5 transition-all hover:-translate-y-1 hover:shadow-lg">
                        <svg class="w-5 h-5 text-blue-600 group-hover:scale-110 transition-transform" fill="currentColor" viewBox="0 0 24 24"><path d="M22.675 0H1.325C.593 0 0 .593 0 1.325v21.351C0 23.407.593 24 1.325 24H12.82v-9.294H9.692v-3.622h3.128V8.413c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.622h-3.12V24h6.116c.73 0 1.323-.593 1.323-1.325V1.325C24 .593 23.407 0 22.675 0z"/></svg>
                        <span class="text-[9px] uppercase tracking-widest font-black text-gray-700 dark:text-gray-200">FB</span>
                    </button>
                    <button type="button" class="group flex items-center justify-center py-3 px-2 border border-gray-100 dark:border-white/5 rounded-xl hover:bg-gray-50 dark:hover:bg-white/5 transition-all hover:-translate-y-1 hover:shadow-lg">
                        <svg class="w-5 h-5 text-red-500 group-hover:scale-110 transition-transform" fill="currentColor" viewBox="0 0 24 24"><path d="M12.48 10.92v3.28h7.84c-.24 1.84-2.21 5.42-7.84 5.42-4.86 0-8.82-4.02-8.82-8.98s3.96-8.98 8.82-8.98c2.77 0 4.62 1.17 5.67 2.18l2.58-2.48c-1.66-1.55-4.25-2.52-8.25-2.52-7.18 0-13 5.82-13 13s5.82 13 13 13c7.5 0 12.48-5.28 12.48-12.71 0-.86-.1-1.51-.22-2.16h-12.26z"/></svg>
                        <span class="text-[9px] uppercase tracking-widest font-black text-gray-700 dark:text-gray-200">Google</span>
                    </button>
                    <button type="button" class="group flex items-center justify-center py-3 px-2 border border-gray-100 dark:border-white/5 rounded-xl hover:bg-gray-50 dark:hover:bg-white/5 transition-all hover:-translate-y-1 hover:shadow-lg">
                        <svg class="w-5 h-5 text-black dark:text-white group-hover:scale-110 transition-transform" fill="currentColor" viewBox="0 0 24 24"><path d="M17.073 10.115c-.013-2.392 1.954-3.541 2.046-3.593-1.11-1.623-2.835-1.844-3.447-1.869-1.465-.149-2.858.859-3.601.859-.743 0-1.921-.84-3.159-.815-1.629.025-3.131.951-3.969 2.408-1.696 2.946-.434 7.301 1.21 9.68 0.805 1.162 1.763 2.466 3.023 2.418 1.21-.048 1.666-.78 3.129-.78 1.463 0 1.874.78 3.149.756 1.303-.024 2.127-1.187 2.927-2.352 0.924-1.353 1.303-2.663 1.323-2.731-.028-.013-2.545-.975-2.571-3.882zM14.93 5.485c.66-.799 1.105-1.906 0.983-3.018-0.957.039-2.114.639-2.8 1.439-.619.715-1.161 1.85-1.018 2.936 1.066.082 2.158-.558 2.835-1.357z"/></svg>
                        <span class="text-[9px] uppercase tracking-widest font-black text-gray-700 dark:text-gray-200">Apple</span>
                    </button>
                </div>

                <p class="text-center text-[10px] text-gray-400 uppercase tracking-widest mt-8">
                    Don't have an account? <a href="signup.html" class="text-primary hover:underline font-bold">Register Now</a>
                </p>
            </form>
        </div>
    </div>

    <!-- Theme/RTL Toggles -->
    <div class="fixed top-8 right-8 flex items-center space-x-4 z-50">
        <button id="theme-toggle" class="theme-toggle hidden xl:block p-2 hover:text-primary transition-colors text-primary"></button>
        <button id="rtl-toggle" class="rtl-toggle hidden xl:block px-3 py-1 text-xs border border-primary text-primary rounded-full hover:bg-primary hover:text-white transition-all uppercase font-semibold">RTL</button>
    </div>

    <script src="main.js"></script>
</body>
</html>
