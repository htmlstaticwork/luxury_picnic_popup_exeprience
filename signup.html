<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Elite | Picnique Luxury Experiences</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#D4AF37',
                        secondary: '#FFF9F5',
                        accent: '#F8D7DA',
                    },
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
</head>
<body class="bg-secondary dark:bg-[#121212] text-text-dark dark:text-text-light min-h-screen flex items-center justify-center p-6 bg-[url('assets/bg-pattern.png')] bg-fixed">

    <div class="max-w-5xl w-full bg-white dark:bg-[#1A1A1A] rounded-[3rem] shadow-2xl overflow-hidden flex flex-col md:flex-row min-h-[700px]">
        <!-- Left Side: Aesthetic Image/Content -->
        <div class="md:w-1/2 relative hidden md:block">
            <img src="assets/home2-hero.png" alt="Luxury Setup" class="absolute inset-0 w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-primary/80 to-transparent flex flex-col justify-end p-12 text-white">
                <h2 class="text-4xl font-serif mb-4 italic">Start Your Story</h2>
                <p class="text-sm opacity-90 leading-relaxed font-light">Join our exclusive community and gain access to bespoke styling, priority bookings, and curated surprises for your celebrations.</p>
            </div>
        </div>

        <!-- Right Side: Form -->
        <div class="md:w-1/2 p-10 md:p-16 flex flex-col justify-center">
            <div class="mb-10 text-center">
                <a href="index.html" class="flex items-center justify-center space-x-3 mb-10 group">
                    <img src="assets/favicon.svg" alt="Picnique Logo" class="h-12 w-12 object-contain group-hover:scale-110 transition-transform">
                    <span class="font-serif text-3xl font-bold text-primary tracking-tight">Picnique</span>
                </a>
                <h1 class="text-2xl font-serif mb-2">Create Account</h1>
                <p class="text-gray-400 text-xs uppercase tracking-widest font-medium">Become an elite member for unique experiences.</p>
            </div>

            <form class="space-y-6">
                <div class="space-y-6">
                    <div>
                        <label class="block text-[10px] uppercase tracking-widest font-black text-gray-400 mb-2">First Name</label>
                        <input type="text" class="w-full bg-gray-50 dark:bg-black/20 border border-gray-100 dark:border-white/5 py-3 px-4 rounded-xl focus:border-primary outline-none transition-all placeholder-gray-300" placeholder="Alexander">
                    </div>
                    <div>
                        <label class="block text-[10px] uppercase tracking-widest font-black text-gray-400 mb-2">Last Name</label>
                        <input type="text" class="w-full bg-gray-50 dark:bg-black/20 border border-gray-100 dark:border-white/5 py-3 px-4 rounded-xl focus:border-primary outline-none transition-all placeholder-gray-300" placeholder="Rose">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] uppercase tracking-widest font-black text-gray-400 mb-2">Email address</label>
                    <input type="email" class="w-full bg-gray-50 dark:bg-black/20 border border-gray-100 dark:border-white/5 py-3 px-4 rounded-xl focus:border-primary outline-none transition-all placeholder-gray-300" placeholder="alex@luxe.com">
                </div>

                <div>
                    <label class="block text-[10px] uppercase tracking-widest font-black text-gray-400 mb-2">Password</label>
                    <input type="password" class="w-full bg-gray-50 dark:bg-black/20 border border-gray-100 dark:border-white/5 py-3 px-4 rounded-xl focus:border-primary outline-none transition-all placeholder-gray-300" placeholder="••••••••">
                </div>

                <div>
                    <label class="block text-[10px] uppercase tracking-widest font-black text-gray-400 mb-2">Confirm Password</label>
                    <input type="password" class="w-full bg-gray-50 dark:bg-black/20 border border-gray-100 dark:border-white/5 py-3 px-4 rounded-xl focus:border-primary outline-none transition-all placeholder-gray-300" placeholder="••••••••">
                </div>

                <div class="flex items-center space-x-2">
                    <input type="checkbox" id="terms" class="w-4 h-4 accent-primary rounded">
                    <label for="terms" class="text-[10px] text-gray-400 uppercase tracking-widest">I agree to the <a href="#" class="text-primary hover:underline">Terms & Conditions</a></label>
                </div>

                <button type="submit" class="w-full py-4 bg-primary text-white text-xs font-bold uppercase tracking-[0.2em] rounded-xl hover:shadow-2xl hover:shadow-primary/30 transition-all hover:-translate-y-1">
                    Create Elite Account
                </button>

                <!-- Login link removed as login page is deleted -->
            </form>
        </div>
    </div>

    <!-- Theme/RTL Toggles -->
    <!-- Theme/RTL Toggles (Moved to Top-Right) -->
    <div class="fixed top-8 right-8 flex items-center space-x-4 z-50">
        <button id="theme-toggle" class="p-3 bg-white dark:bg-[#1A1A1A] rounded-full shadow-lg text-primary"></button>
        <button id="rtl-toggle" class="px-3 py-1 bg-white dark:bg-[#1A1A1A] rounded-full shadow-lg text-xs font-bold text-primary">RTL</button>
    </div>

    <script src="main.js"></script>
</body>
</html>
