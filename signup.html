<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Elite | Picnique Luxury Experiences</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#D4AF37',
                        secondary: '#FFF9F5',
                        accent: '#F8D7DA',
                    },
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
</head>
<body class="bg-secondary dark:bg-[#121212] text-text-dark dark:text-text-light min-h-screen flex items-center justify-center p-6 bg-[url('assets/bg-pattern.png')] bg-fixed">

    <div class="max-w-xl w-full bg-white dark:bg-[#1A1A1A] rounded-[3rem] shadow-2xl overflow-hidden min-h-[700px] flex flex-col items-center justify-center">
        <!-- Right Side: Form (Now centered) -->
        <div class="w-full p-10 md:p-16 flex flex-col justify-center">
            <div class="mb-10 text-center">
                <a href="index.html" class="flex items-center justify-center space-x-3 mb-10 group">
                    <img src="assets/favicon.svg" alt="Picnique Logo" class="h-12 w-12 object-contain group-hover:scale-110 transition-transform">
                    <span class="font-serif text-3xl font-bold text-primary tracking-tight">Picnique</span>
                </a>
                <h1 class="text-2xl font-serif mb-2">Create Account</h1>
                <p class="text-gray-400 text-xs uppercase tracking-widest font-medium">Become an elite member for unique experiences.</p>
            </div>

<form class="space-y-6">
                <div>
                    <label class="block text-[10px] uppercase tracking-widest font-black text-gray-400 mb-2">First Name</label>
                    <input type="text" required class="w-full bg-gray-50 dark:bg-black/20 border border-gray-100 dark:border-white/5 py-3 px-4 rounded-xl focus:border-primary outline-none transition-all placeholder-gray-300" placeholder="Alexander">
                </div>
                <div>
                    <label class="block text-[10px] uppercase tracking-widest font-black text-gray-400 mb-2">Last Name</label>
                    <input type="text" required class="w-full bg-gray-50 dark:bg-black/20 border border-gray-100 dark:border-white/5 py-3 px-4 rounded-xl focus:border-primary outline-none transition-all placeholder-gray-300" placeholder="Rose">
                </div>

                <div>
                    <label class="block text-[10px] uppercase tracking-widest font-black text-gray-400 mb-2">Email address</label>
                    <input type="email" required class="w-full bg-gray-50 dark:bg-black/20 border border-gray-100 dark:border-white/5 py-3 px-4 rounded-xl focus:border-primary outline-none transition-all placeholder-gray-300" placeholder="alex@luxe.com">
                </div>

                <div>
                    <label class="block text-[10px] uppercase tracking-widest font-black text-gray-400 mb-2">Password</label>
                    <input type="password" required class="w-full bg-gray-50 dark:bg-black/20 border border-gray-100 dark:border-white/5 py-3 px-4 rounded-xl focus:border-primary outline-none transition-all placeholder-gray-300" placeholder="••••••••">
                </div>

                <div class="flex items-center space-x-2">
                    <input type="checkbox" id="terms" required class="w-4 h-4 accent-primary rounded">
                    <label for="terms" class="text-[10px] text-gray-400 uppercase tracking-widest">I agree to the <a href="#" class="text-primary hover:underline">Terms & Conditions</a></label>
                </div>

                <button type="submit" class="w-full py-4 bg-primary text-white text-xs font-bold uppercase tracking-[0.2em] rounded-xl hover:shadow-2xl hover:shadow-primary/30 transition-all hover:-translate-y-1">
                    Create Elite Account
                </button>

                <div class="relative flex py-8 items-center">
                    <div class="flex-grow border-t border-gray-100 dark:border-white/5"></div>
                    <span class="flex-shrink mx-4 text-gray-400 text-[10px] uppercase tracking-widest">Or register with</span>
                    <div class="flex-grow border-t border-gray-100 dark:border-white/5"></div>
                </div>

                <!-- Social Signup -->
                <div class="grid grid-cols-3 gap-4">
                    <button type="button" class="group flex items-center justify-center py-3 px-2 border border-gray-100 dark:border-white/5 rounded-xl hover:bg-gray-50 dark:hover:bg-white/5 transition-all hover:-translate-y-1 hover:shadow-lg">
                        <svg class="w-6 h-6 group-hover:scale-110 transition-transform" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0z" fill="#1877F2"/>
                            <path d="M15.352 12l.526-3.469h-3.328V6.281c0-.943.463-1.863 1.942-1.863h1.5V1.439s-1.365-.233-2.67-.233c-2.723 0-4.502 1.65-4.502 4.639v2.686H5.707v3.469h3.111v8.384a12.019 12.019 0 003.18-.016V12h3.354z" fill="white"/>
                        </svg>
                    </button>
                    <button type="button" class="group flex items-center justify-center py-3 px-2 border border-gray-100 dark:border-white/5 rounded-xl hover:bg-gray-50 dark:hover:bg-white/5 transition-all hover:-translate-y-1 hover:shadow-lg">
                        <svg class="w-6 h-6 group-hover:scale-110 transition-transform" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                    </button>
                    <button type="button" class="group flex items-center justify-center py-3 px-2 border border-gray-100 dark:border-white/5 rounded-xl hover:bg-gray-50 dark:hover:bg-white/5 transition-all hover:-translate-y-1 hover:shadow-lg">
                        <svg class="w-6 h-6 text-black dark:text-white group-hover:scale-110 transition-transform" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M17.073 10.115c-.013-2.392 1.954-3.541 2.046-3.593-1.11-1.623-2.835-1.844-3.447-1.869-1.465-.149-2.858.859-3.601.859-.743 0-1.921-.84-3.159-.815-1.629.025-3.131.951-3.969 2.408-1.696 2.946-.434 7.301 1.21 9.68 0.805 1.162 1.763 2.466 3.023 2.418 1.21-.048 1.666-.78 3.129-.78 1.463 0 1.874.78 3.149.756 1.303-.024 2.127-1.187 2.927-2.352 0.924-1.353 1.303-2.663 1.323-2.731-.028-.013-2.545-.975-2.571-3.882zM14.93 5.485c.66-.799 1.105-1.906 0.983-3.018-0.957.039-2.114.639-2.8 1.439-.619.715-1.161 1.85-1.018 2.936 1.066.082 2.158-.558 2.835-1.357z"/>
                        </svg>
                    </button>
                </div>

                <p class="text-center text-[10px] text-gray-400 uppercase tracking-widest mt-8">
                    Already have an account? <a href="signin.html" class="text-primary hover:underline font-bold">Sign In</a>
                </p>
            </form>
        </div>
    </div>

    <!-- Theme/RTL Toggles -->
    <!-- Theme/RTL Toggles (Moved to Top-Right) -->
    <div class="fixed top-8 right-8 flex items-center space-x-4 z-50">
        <button id="theme-toggle" class="theme-toggle hidden xl:block p-2 hover:text-primary transition-colors text-primary"></button>
        <button id="rtl-toggle" class="rtl-toggle hidden xl:block px-3 py-1 text-xs border border-primary text-primary rounded-full hover:bg-primary hover:text-white transition-all uppercase font-semibold">RTL</button>
    </div>

    <script src="main.js"></script>
</body>
</html>
